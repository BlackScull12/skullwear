<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <h2>ADMIN DASHBOARD</h2>

  <input placeholder="Product Name" id="name"><br><br>
  <input placeholder="Image URL" id="img"><br><br>
  <input placeholder="Price" id="price"><br><br>
  <select id="currency">
    <option>$</option><option>€</option><option>₹</option>
    <option>¥</option><option>£</option><option>د</option>
  </select><br><br>

  <button onclick="addProduct()">ADD PRODUCT</button>

  <h3>SET DROP DATE</h3>
  <input type="datetime-local" id="drop">
  <button onclick="setDrop()">SET</button>
</div>

<script src="js/admin.js"></script>
</body>
</html>
